<!DOCTYPE html>
<html>
<head>
  <title>Word Family</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <span id="title"></span>
</header>

<section class="container">

  <div class="card">
    <h2>Words 单词</h2>
    <p id="words"></p>
    <img src="https://via.placeholder.com/120">
  </div>

  <div class="card">
    <h2>Sentence 句子</h2>
    <p id="sentence"></p>
  </div>

  <div class="card">
    <h2>Quiz 测验</h2>
    <p id="quiz"></p>
    <button onclick="show()">Show Answer</button>
    <p id="answer"></p>
  </div>

</section>

<div class="back">
  <a href="level1.html">⬅ Back</a>
</div>

<script src="data.js"></script>
<script>

const order = ["at","an","ap","ad","ag","am","ab","ack","and","ang","ank","ash","ast","atch"];

const params = new URLSearchParams(window.location.search);
const name = params.get("name");

const data = families[name];

document.getElementById("title").innerText = "-" + name + " Family";
document.getElementById("words").innerText = data.words.join(" · ");
document.getElementById("sentence").innerText = data.sentence;
document.getElementById("quiz").innerText = data.quiz;

function show(){
  document.getElementById("answer").innerText = data.answer;
}

// Next按钮
const index = order.indexOf(name);
let nextBtn = document.createElement("a");

if(index !== -1 && index < order.length - 1){
  nextBtn.href = "family.html?name=" + order[index+1];
  nextBtn.innerText = "Next →";
} else {
  nextBtn.href = "level1.html";
  nextBtn.innerText = "🏁 Finish";
}

document.querySelector(".back").appendChild(nextBtn);

</script>

</body>
</html>
