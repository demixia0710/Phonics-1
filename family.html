<!DOCTYPE html>
<html>
<head>
  <title>Word Family</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header id="title"></header>

<section class="container">

  <!-- 单词 -->
  <div class="card">
    <h2>Words 🔊</h2>
    <div id="words"></div>
  </div>

  <!-- 句子 -->
  <div class="card">
    <h2>Sentence</h2>
    <p id="sentence"></p>
  </div>

  <!-- Quiz -->
  <div class="card">
    <h2>Quiz 🎮</h2>
    <p id="question"></p>
    <div id="options"></div>
    <p id="feedback"></p>
  </div>

</section>

<div class="back" id="nav"></div>

<script src="data.js"></script>
<script>

const order = ["at","an","ap"];
const params = new URLSearchParams(window.location.search);
const name = params.get("name");
const data = families[name];

document.getElementById("title").innerText = "-" + name + " Family";

/* ===== 单词 + 发音 + 图片 ===== */
const wordsDiv = document.getElementById("words");

data.words.forEach(word=>{
  let btn = document.createElement("div");
  btn.innerHTML = `
    <p onclick="speak('${word}')">${word}</p>
    <img src="https://source.unsplash.com/100x100/?${word}">
  `;
  wordsDiv.appendChild(btn);
});

/* ===== 发音 ===== */
function speak(word){
  let utter = new SpeechSynthesisUtterance(word);
  speechSynthesis.speak(utter);
}

/* ===== Quiz ===== */
let current = 0;

function loadQuiz(){
  let q = data.quiz[current];
  document.getElementById("question").innerText = q.q;

  let optionsDiv = document.getElementById("options");
  optionsDiv.innerHTML = "";

  q.options.forEach(opt=>{
    let btn = document.createElement("button");
    btn.innerText = opt;
    btn.onclick = ()=>check(opt, q.answer);
    optionsDiv.appendChild(btn);
  });
}

function check(choice, answer){
  let feedback = document.getElementById("feedback");

  if(choice === answer){
    feedback.innerText = "✅ Correct!";
    current++;

    if(current < data.quiz.length){
      setTimeout(loadQuiz, 800);
    } else {
      feedback.innerText = "🎉 Completed!";
      saveProgress(name);
    }

  } else {
    feedback.innerText = "❌ Try again";
  }
}

/* ===== 进度记录 ===== */
function saveProgress(name){
  let progress = JSON.parse(localStorage.getItem("progress") || "[]");
  if(!progress.includes(name)){
    progress.push(name);
    localStorage.setItem("progress", JSON.stringify(progress));
  }
}

/* ===== Next按钮 ===== */
const index = order.indexOf(name);
let nav = document.getElementById("nav");

let next = document.createElement("a");

if(index < order.length -1){
  next.href = "family.html?name=" + order[index+1];
  next.innerText = "Next →";
}else{
  next.href = "level1.html";
  next.innerText = "🏁 Finish";
}

nav.appendChild(next);

/* 初始化 */
document.getElementById("sentence").innerText = data.sentence;
loadQuiz();

</script>

</body>
</html>
